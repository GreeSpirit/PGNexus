version: '3.8'

services:
  # PGNexus Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pgnexus-app
    user: "1000:1000"  # Run as host user to avoid permission issues
    environment:
      # Application Configuration
      PORT: ${PORT:-3000}
      HOSTNAME: ${HOSTNAME:-0.0.0.0}
      NODE_ENV: production

      # Database Configuration (using individual components)
      PG_HOST: pgnexus-postgres
      PG_PORT: ${PG_PORT:-5432}
      PG_USER: ${PG_USER:-n8n-user}
      PG_PASSWORD: ${PG_PASSWORD:-mypass}
      PG_DB: ${PG_DB:-n8n-db}
      PG_SCHEMA: ${PG_SCHEMA:-public}

      # OR use full DATABASE_URL (comment out PG_* variables above if using this)
      # DATABASE_URL: postgresql://${PG_USER:-pgnexus}:${PG_PASSWORD:-changeme}@postgres:5432/${PG_DB:-pgnexus}

      # NextAuth Configuration
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}

      # API Upload Token (optional - for markdown file uploads)
      API_TOKEN: ${API_TOKEN}

      # Optional: Skip migrations if already run
      SKIP_MIGRATIONS: "true"
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      # Mount content directory for daily updates (read-write for API uploads)
      - ./content:/app/content
    restart: unless-stopped
    networks:
      - pgnexus-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
 
  n8n:
    image: docker.n8n.io/n8nio/n8n:2.3.5
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: n8n.pgnexus.ai
      N8N_PROTOCOL: http
        #N8N_SSL_CERT: /certs/fullchain.pem
        #N8N_SSL_KEY: /certs/privkey.pem
      WEBHOOK_URL: https://n8n.pgnexus.ai/
    volumes:
      #- ./nginx/certs/n8n-fullchain.pem:/certs/fullchain.pem:ro
      #- ./nginx/certs/n8n-privkey.pem:/certs/privkey.pem:ro
      - n8n-data:/home/node/.n8n
    networks:
      - pgnexus-network
      - pubnet

  nginx:
    image: nginx:1.25-alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/logs:/var/log/nginx
    networks:
      - pgnexus-network
      - pubnet

  db:
    image: postgres:18.1
    container_name: pgnexus-postgres
    shm_size: 256mb
    ports:
      - "5432:5432"
    networks:
      - pgnexus-network
    environment:
      POSTGRES_USER: ${PG_USER:-n8n-user}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-mypass}
      POSTGRES_DB: ${PG_DB:-n8n-db}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n-user -d n8n-db"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    volumes:
      - n8n-postgres-data:/var/lib/postgresql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  n8n-postgres-data: {}
  n8n-data: {}

networks:
  pgnexus-network:
    driver: bridge
    internal: true
  pubnet:
    driver: bridge
